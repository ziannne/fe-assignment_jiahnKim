<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>To-do List</h1>
    <div class="input-section">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." maxlength="40">
            <button id="add-btn">추가</button>
        </div>
        <ul id="todo-list"></ul>
        <div class="filter-row">
    <button class="filter-btn active" id="f-all"    onclick="setFilter('all')">전체</button>
    <button class="filter-btn"        id="f-active" onclick="setFilter('active')">미완료</button>
    <button class="filter-btn"        id="f-done"   onclick="setFilter('done')">완료</button>
    <span class="stats" id="stats"></span>
  </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
